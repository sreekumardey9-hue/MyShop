<!DOCTYPE html>
<html>

<head>

<title>Product Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin:0;
}

.box{
background:white;
width:350px;
margin:60px auto;
padding:20px;
border-radius:12px;
box-shadow:0 2px 15px rgba(0,0,0,0.2);
}

img{
width:200px;
margin-bottom:10px;
}

button{
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
margin:5px;
font-size:15px;
}

.cart{
background:#ff9800;
color:white;
}

.buy{
background:green;
color:white;
}

.wish{
background:#ff4d4d;
color:white;
}

a{
text-decoration:none;
color:blue;
}

</style>

</head>

<body>

<div class="box">

<h2 id="name">Product</h2>

<img id="img" src="https://via.placeholder.com/200">

<h3>Price: ₹ <span id="price">0</span></h3>

<button class="cart" onclick="addCart()">🛒 Add to Cart</button>

<button class="buy" onclick="buyNow()">⚡ Buy Now</button>

<button class="wish" onclick="addWishlist()">❤️ Wishlist</button>

<br><br>

<a href="index.html">⬅ Back to Shop</a>

</div>

<script>

/* Get product data from URL */

let params = new URLSearchParams(window.location.search);

let name = params.get("name");
let price = params.get("price");
let img = params.get("img");

/* Show product safely */

if(name){
document.getElementById("name").innerText = name;
}

if(price){
document.getElementById("price").innerText = price;
}

if(img){
document.getElementById("img").src = img;
}

/* Add to cart */

function addCart(){

if(!name || !price){
alert("Product not found");
return;
}

let cart = parseInt(localStorage.getItem("cartItems")) || 0;
let total = parseInt(localStorage.getItem("cartPrice")) || 0;
let items = JSON.parse(localStorage.getItem("items")) || [];

cart++;
total += parseInt(price);

items.push({
name:name,
price:price,
img:img
});

localStorage.setItem("cartItems",cart);
localStorage.setItem("cartPrice",total);
localStorage.setItem("items",JSON.stringify(items));

alert("🛒 Added to cart");

}

/* Buy now */

function buyNow(){

if(!name || !price){
alert("Product not found");
return;
}

localStorage.setItem("productName",name);
localStorage.setItem("buyPrice",price);

window.location="payment.html";

}

/* Add Wishlist */

function addWishlist(){

if(!name || !price){
alert("Product not found");
return;
}

let wish = JSON.parse(localStorage.getItem("wishlist")) || [];

wish.push({
name:name,
price:price,
img:img
});

localStorage.setItem("wishlist",JSON.stringify(wish));

alert("❤️ Added to Wishlist");

}

</script>

</body>
</html>
