<!DOCTYPE html>
<html>

<head>
<title>Signup Page</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.signup-box{
background:white;
width:320px;
padding:20px;
margin:100px auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
background:green;
color:white;
padding:10px;
border:none;
cursor:pointer;
width:95%;
}

a{
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="signup-box">

<h2>Signup</h2>

<input type="text" placeholder="Enter username" id="newuser">

<input type="password" placeholder="Enter password" id="newpass">

<button onclick="signup()">Signup</button>

<a href="login.html">Already have account? Login</a>

</div>

<script>

function signup(){

let user = document.getElementById("newuser").value;
let pass = document.getElementById("newpass").value;

if(user=="" || pass==""){
alert("Please fill all fields");
return;
}

/* Get users from localStorage */

let users = JSON.parse(localStorage.getItem("users")) || [];

/* Check if user exists */

let exist = users.find(u => u.username === user);

if(exist){
alert("Username already exists");
return;
}

/* Save new user */

let newUser = {
username:user,
password:pass
};

users.push(newUser);

localStorage.setItem("users",JSON.stringify(users));

alert("Account created successfully!");

window.location.href="login.html";

}

<script>

function register(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

let users = JSON.parse(localStorage.getItem("users")) || [];

users.push({
name:name,
phone:phone
});

localStorage.setItem("users",JSON.stringify(users));

alert("Registration successful");

}

</script>

</body>
</html>
