<!DOCTYPE html>
<html>

<head>

<title>Products</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

.product{
background:white;
width:200px;
padding:15px;
margin:15px;
display:inline-block;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

img{
width:100%;
border-radius:8px;
}

button{
background:green;
color:white;
border:none;
padding:8px;
margin-top:5px;
cursor:pointer;
border-radius:5px;
}

.stock{
font-size:14px;
color:#555;
}

</style>

</head>

<body>

<h1>🛒 Products</h1>

<div id="products"></div>

<script>

/* Load products */

let products = JSON.parse(localStorage.getItem("products")) || [];

/* Demo product if empty */

if(products.length==0){

products=[
{
name:"T-Shirt",
price:500,
image:"https://via.placeholder.com/200",
stock:10
},
{
name:"Shoes",
price:1200,
image:"https://via.placeholder.com/200",
stock:5
}
];

localStorage.setItem("products",JSON.stringify(products));

}

/* Show products */

function showProducts(){

let html="";

products.forEach(function(p,i){

html+=`
<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<p class="stock">Stock: ${p.stock}</p>

<button onclick="addToCart(${i})" ${p.stock<=0 ? "disabled":""}>
${p.stock<=0 ? "Out of Stock":"Add to Cart"}
</button>

</div>
`;

});

document.getElementById("products").innerHTML=html;

}

showProducts();

/* Add to cart */

function addToCart(i){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push(products[i]);

localStorage.setItem("cart",JSON.stringify(cart));

/* reduce stock */

products[i].stock--;

localStorage.setItem("products",JSON.stringify(products));

alert("Added to Cart");

showProducts();

}

</script>

</body>

</html>
