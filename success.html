<!DOCTYPE html>
<html>

<head>
<title>Payment Success</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:350px;
margin:120px auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.success{
font-size:24px;
color:green;
margin-bottom:15px;
}

button{
background:green;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#0a8a0a;
}

</style>

</head>

<body>

<div class="box">

<div class="success">
✅ Payment Successful
</div>

<p>Your order has been placed successfully.</p>

<p>Order ID: <b id="orderid"></b></p>

<p>Items: <b id="items"></b></p>

<p>Total Paid: ₹<span id="paid"></span></p>

<button onclick="goShop()">Back to Home</button>

</div>

<script>

/* Generate Order ID */

let orderId = "ORD" + Math.floor(Math.random()*1000000);

/* Get cart data */

let items = localStorage.getItem("items");
let price = localStorage.getItem("cartPrice");

/* Fix undefined */

if(!items){
items = "Product";
}

if(!price){
price = 0;
}

/* Show data */

document.getElementById("orderid").innerText = orderId;
document.getElementById("items").innerText = items;
document.getElementById("paid").innerText = price;

/* Save order */

let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
id: orderId,
items: items,
price: price
});

localStorage.setItem("orders", JSON.stringify(orders));

/* Clear cart */

localStorage.removeItem("items");
localStorage.removeItem("cartPrice");

function goShop(){
window.location="index.html";
}

</script>

</body>
</html>
