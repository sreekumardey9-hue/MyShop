<!DOCTYPE html>
<html lang="en">
<head>
  <title>MyShop Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial,sans-serif;
      text-align:center;
      background:#f2f2f2;
      margin:0;
      padding:20px 0;
    }

    .box{
      background:white;
      width:380px;
      max-width:90%;
      margin:40px auto;
      padding:25px 20px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.2);
    }

    img{
      width:260px;
      margin:15px 0;
      border-radius:10px;
    }

    .qtybox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
    }

    .qtybox button{
      width:35px;
      height:35px;
      font-size:18px;
      background:#eee;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    input{
      padding:8px;
      width:180px;
      max-width:90%;
      text-align:center;
      font-size:16px;
      margin-top:5px;
      border:1px solid #ddd;
      border-radius:5px;
    }

    button{
      padding:10px 16px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
      margin:5px;
    }

    .phonepe{background:#5f259f;color:white;}
    .paytm{background:#00baf2;color:white;}
    .gpay{background:#34a853;color:white;}
    .razor{background:#0f9d58;color:white;}
    .done{background:#28a745;color:white;margin-top:10px;}
    .verify{background:#ff9800;color:white;}

    .timer{
      font-size:18px;
      color:red;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="box">

<h2>💳 MyShop Payment</h2>

<p>Price per item: ₹<span id="price">100</span></p>

<p>Quantity</p>

<div class="qtybox">
<button onclick="minus()">-</button>
<input type="number" id="qty" value="1" min="1" max="10">
<button onclick="plus()">+</button>
</div>

<p>Total Amount: ₹<span id="total">100</span></p>

<p>UPI ID: <strong>myshop290@slc</strong></p>

<p>Scan QR or Pay Using App</p>

<img id="qr" alt="UPI QR Code">

<div>
<button class="phonepe" onclick="openUPIApp()">PhonePe</button>
<button class="paytm" onclick="openUPIApp()">Paytm</button>
<button class="gpay" onclick="openUPIApp()">Google Pay</button>
</div>

<br>

<button class="razor" onclick="razorpayPay()">Pay with Razorpay</button>

<br><br>

<p>Enter UPI Transaction ID (UTR)</p>

<input type="text" id="utr" placeholder="Enter 12-digit UTR">

<br>

<button class="verify" onclick="verifyPayment()">Verify Payment</button>

<p class="timer">Time Left: <span id="time">600</span> sec</p>

<button class="done" onclick="placeOrder()">Payment Done</button>

<p id="orderId"></p>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="razorpay.js"></script>

<script>

let price = Number(
localStorage.getItem("buyPrice") ||
localStorage.getItem("cartPrice") ||
100
);

document.getElementById("price").innerText = price;

let paymentSuccess = false;

function plus(){

let qtyEl=document.getElementById("qty");
let qty=Number(qtyEl.value);

if(qty<10){
qtyEl.value=qty+1;
updateTotal();
}

}

function minus(){

let qtyEl=document.getElementById("qty");
let qty=Number(qtyEl.value);

if(qty>1){
qtyEl.value=qty-1;
updateTotal();
}

}

document.getElementById("qty").addEventListener("input",function(){

let qty=this.value;

if(qty<1) qty=1;
if(qty>10) qty=10;

this.value=qty;

updateTotal();

});

function updateTotal(){

let qty=Number(document.getElementById("qty").value);

let total=qty*price;

document.getElementById("total").innerText=total;

generateQR(total);

}

function generateQR(total){

let upiLink=`upi://pay?pa=myshop290@slc&pn=MyShop&am=${total}&cu=INR`;

document.getElementById("qr").src=
"https://quickchart.io/qr?size=300&text="+encodeURIComponent(upiLink);

}

function openUPIApp(){

let total=Number(document.getElementById("total").innerText);

if(total<=0){
alert("Invalid amount");
return;
}

let upiLink=`upi://pay?pa=myshop290@slc&pn=MyShop&am=${total}&cu=INR`;

window.location.href=upiLink;

}

function verifyPayment(){

let utr=document.getElementById("utr").value.trim();

if(!/^[0-9]{12}$/.test(utr)){

alert("Invalid UTR ❌ Please enter 12-digit transaction ID.");

return;

}

paymentSuccess=true;

localStorage.setItem("paymentUTR",utr);

alert("Payment Submitted ✅");

}

let time=600;

let timer=setInterval(function(){

time--;

document.getElementById("time").innerText=time;

if(time<=0){

clearInterval(timer);

alert("Payment Session Expired ⏳");

window.location.href="index.html";

}

},1000);

function generateOrderID(){

return "ORD"+Date.now()+Math.floor(1000+Math.random()*9000);

}

function placeOrder(){

if(!paymentSuccess){

alert("Payment not verified ❌ Please verify your UTR.");

return;

}

let orderId=generateOrderID();

let amount=document.getElementById("total").innerText;

let order={

id:orderId,
amount:amount,
paymentID:localStorage.getItem("paymentID")||"",
status:"Processing"

};

localStorage.setItem("lastOrder",JSON.stringify(order));

document.getElementById("orderId").innerHTML=
"Order Submitted<br>Order ID: "+orderId;

setTimeout(function(){

window.location.href="orders.html";

},2000);

}

updateTotal();

</script>

</body>
</html>
