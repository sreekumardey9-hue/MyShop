<!DOCTYPE html>
<html>

<head>

<title>Order Tracking</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
margin:0;
}

h1{
margin-top:30px;
}

.box{
width:360px;
margin:60px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:green;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:darkgreen;
}

.step{
margin:8px;
padding:10px;
border-radius:5px;
background:#eee;
}

.active{
background:green;
color:white;
}

.orderinfo{
margin-top:15px;
font-size:15px;
}

.delivery{
margin-top:10px;
font-weight:bold;
}

.statusText{
margin-top:10px;
font-weight:bold;
color:green;
}

.truck{
font-size:35px;
margin-top:15px;
animation:truckmove 2s linear infinite;
}

@keyframes truckmove{

0%{transform:translateX(-70px);}
50%{transform:translateX(0);}
100%{transform:translateX(70px);}

}

</style>

</head>

<body>

<h1>📦 Track Your Order</h1>

<div class="box">

<input type="text" id="orderId" placeholder="Enter Order ID">

<br>

<button onclick="trackOrder()">Track Order</button>

<div id="result"></div>

</div>

<script>

let steps=[
"Order Placed",
"Packed",
"Shipped",
"Out for Delivery",
"Delivered"
];

let progress=0;
let orderData=null;

function trackOrder(){

let id=document.getElementById("orderId").value.trim();

if(id==""){
alert("Enter Order ID");
return;
}

let data = localStorage.getItem("order_"+id);

if(!data){

document.getElementById("result").innerHTML =
"<p style='color:red'>❌ Order Not Found</p>";

return;

}

orderData = JSON.parse(data);

progress = orderData.status || 0;

showOrder();

let timer=setInterval(function(){

progress++;

if(progress>4){

clearInterval(timer);

progress=4;

}

orderData.status=progress;

localStorage.setItem("order_"+orderData.id,JSON.stringify(orderData));

showOrder();

},4000);

}

function showOrder(){

let orderDate = new Date(orderData.date);

if(isNaN(orderDate)){
orderDate = new Date();
}

let deliveryDate = new Date(orderDate);

deliveryDate.setDate(orderDate.getDate()+4);

let items="No Items";

if(orderData.items){
items=orderData.items;
}

let currentStatus = steps[progress];

let html="";

html+="<div class='orderinfo'>";
html+="Order ID: <b>"+orderData.id+"</b><br>";
html+="Items: "+items+"<br>";
html+="Amount: ₹"+orderData.price+"<br>";
html+="Order Date: "+orderDate.toLocaleString()+"<br>";
html+="</div>";

html+="<div class='delivery'>Estimated Delivery: "+deliveryDate.toDateString()+"</div>";

html+="<div class='statusText'>Current Status: "+currentStatus+"</div>";

for(let i=0;i<steps.length;i++){

if(i<=progress){
html+="<div class='step active'>"+steps[i]+"</div>";
}else{
html+="<div class='step'>"+steps[i]+"</div>";
}

}

if(progress<4){
html+="<div class='truck'>🚚</div>";
}

document.getElementById("result").innerHTML=html;

}

</script>

</body>

</html>
