<!DOCTYPE html>
<html>

<head>
<title>My Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

.box{
background:white;
width:90%;
max-width:500px;
margin:50px auto;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.order{
background:#fafafa;
padding:15px;
margin-top:15px;
border-radius:8px;
border:1px solid #ddd;
text-align:left;
}

.track{
font-size:14px;
margin-top:4px;
}

.progress{
margin-top:10px;
height:8px;
background:#ddd;
border-radius:5px;
overflow:hidden;
}

.bar{
height:100%;
background:#4CAF50;
width:25%;
}

button{
padding:8px 15px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
margin-top:8px;
}

.cancel{
background:red;
}

.clear{
background:#ff5722;
margin-top:10px;
}

.empty{
color:gray;
margin-top:20px;
}

.status{
margin-top:6px;
font-weight:bold;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#333;
}

</style>
</head>

<body>

<div class="box">

<h2>My Orders 📦</h2>

<div id="orderList"></div>

<br>

<button class="clear" onclick="clearOrders()">Clear All Orders</button>

<a href="index.html">⬅ Back to Shop</a>

</div>

<script>

// LOAD
let orders = JSON.parse(localStorage.getItem("orders")) || [];

// SAVE
function save(){
localStorage.setItem("orders",JSON.stringify(orders));
}

// SHOW
function showOrders(){

orders = JSON.parse(localStorage.getItem("orders")) || [];

let list=document.getElementById("orderList");
list.innerHTML="";

if(orders.length==0){
list.innerHTML="<p class='empty'>No orders yet</p>";
return;
}

orders.forEach(function(order,index){

let progress="25%";
let statusColor="black";

// ✅ STATUS FIX (ADMIN SYNC)
if(order.status=="Processing"){
progress="25%";
statusColor="blue";
}
else if(order.status=="Shipped"){
progress="50%";
statusColor="orange";
}
else if(order.status=="Out for Delivery"){
progress="75%";
statusColor="purple";
}
else if(order.status=="Delivered"){
progress="100%";
statusColor="green";
}
else if(order.status=="Cancelled"){
progress="0%";
statusColor="red";
}
else if(order.status=="Failed"){
progress="0%";
statusColor="red";
}

// SAFE DATA
let name = order.name || order.product || "Product";
let qty = order.qty || 1;
let address = order.address || "No address";

list.innerHTML += `

<div class="order">

<p><b>Order ID:</b> ${order.id}</p>
<p><b>Product:</b> ${name}</p>
<p><b>Qty:</b> ${qty}</p>
<p><b>Price:</b> ₹${order.price}</p>
<p><b>Customer:</b> ${order.customer || "-"}</p>
<p><b>Address:</b> ${address}</p>
<p><b>Time:</b> ${order.date || order.time || "N/A"}</p>

<p class="status" style="color:${statusColor}">
Status: ${order.status}
</p>

<div class="track">📦 Packed: ${order.packed || "-"}</div>
<div class="track">🚚 Shipped: ${order.shipped || "-"}</div>
<div class="track">🏠 Out: ${order.out || "-"}</div>
<div class="track">✅ Delivered: ${order.delivered || "-"}</div>

<div class="progress">
<div class="bar" style="width:${progress}"></div>
</div>

<button onclick="trackOrder('${order.id}')">Track</button>
<button class="cancel" onclick="cancelOrder(${index})">Cancel</button>

</div>

`;

});

}

// TRACK
function trackOrder(id){
alert("🚚 Tracking Order\n\nID: "+id);
}

// CANCEL
function cancelOrder(i){

if(confirm("Cancel order?")){

orders[i].status="Cancelled";
orders[i].packed="Cancelled";
orders[i].shipped="Cancelled";
orders[i].out="Cancelled";
orders[i].delivered="Cancelled";

save();
showOrders();

}

}

// CLEAR
function clearOrders(){

if(confirm("Delete all orders?")){
orders=[];
localStorage.removeItem("orders");
showOrders();
}

}

// 🔥 AUTO SYNC WITH ADMIN (REALTIME)
setInterval(()=>{
showOrders();
},2000);

// INIT
showOrders();

</script>

</body>
</html>
