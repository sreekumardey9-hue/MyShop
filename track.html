<!DOCTYPE html>
<html>

<head>

<title>Track Your Order</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

.box{
width:350px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin-top:10px;
}

button{
background:green;
color:white;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

.step{
padding:10px;
margin:5px;
background:#eee;
border-radius:5px;
}

.active{
background:green;
color:white;
}

.info{
margin-top:10px;
font-size:14px;
color:#555;
}

</style>

</head>

<body>

<h1>📦 Track Your Order</h1>

<div class="box">

<input type="text" id="orderId" placeholder="Enter Order ID">

<br>

<button onclick="trackOrder()">Track</button>

<div id="result"></div>

<div id="info" class="info"></div>

</div>

<script>

let steps=[
"Order Placed",
"Packed",
"Shipped",
"Out for Delivery",
"Delivered"
];

/* Demo Orders */

let demoOrders = {
"ORD1001":{status:0,date:"20 Mar 2026"},
"ORD1002":{status:2,date:"19 Mar 2026"},
"ORD1003":{status:4,date:"18 Mar 2026"}
};

for(let id in demoOrders){

if(!localStorage.getItem(id)){

localStorage.setItem(id, JSON.stringify(demoOrders[id]));

}

}

/* Track Order */

function trackOrder(){

let id=document.getElementById("orderId").value.trim().toUpperCase();

let order = JSON.parse(localStorage.getItem(id));

/* orders history থেকেও খুঁজবে */

if(!order){

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let found = orders.find(o=>o.id===id);

if(found){

order = {
status: found.status || 0,
date: found.date || "Today"
};

}

}

if(!order){

document.getElementById("result").innerHTML="❌ Order not found";

document.getElementById("info").innerHTML="";

return;

}

let html="";

for(let i=0;i<steps.length;i++){

if(i<=order.status){

html+="<div class='step active'>"+steps[i]+"</div>";

}else{

html+="<div class='step'>"+steps[i]+"</div>";

}

}

document.getElementById("result").innerHTML=html;

document.getElementById("info").innerHTML=
"Order ID: <b>"+id+"</b><br>Order Date: "+order.date;

}

/* Enter press করলে track */

document.getElementById("orderId").addEventListener("keypress",function(e){

if(e.key==="Enter"){

trackOrder();

}

});

/* URL auto track */

let params = new URLSearchParams(window.location.search);

let urlId = params.get("id");

if(urlId){

document.getElementById("orderId").value = urlId;

trackOrder();

}

</script>

</body>

</html>
