<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

.header{
background:black;
color:white;
padding:15px;
font-size:22px;
}

.box{
background:white;
width:750px;
max-width:95%;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.order{
border-bottom:1px solid #ddd;
padding:15px;
text-align:left;
margin-bottom:10px;
}

button{
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

.updateBtn{
background:green;
}

.approveBtn{
background:#2196f3;
}

.logout{
background:black;
margin-top:20px;
}

select{
padding:6px;
margin-top:5px;
}

.status{
font-weight:bold;
}

.utr{
color:#444;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">
⚙️ MyShop Admin Panel
</div>

<div class="box">

<h2 id="orderTitle">📦 Orders</h2>

<div id="orders"></div>

<hr>

<h2>🧾 Last Order</h2>
<div id="lastOrder"></div>

<br>

<button onclick="clearOrders()">Clear All Orders</button>

<br><br>

<button class="logout" onclick="logout()">Logout</button>

</div>

<script>

/* Admin login check */

if(localStorage.getItem("admin")!="true"){
window.location="admin-login.html";
}

/* Order status steps */

let steps=[
"Order Placed",
"Packed",
"Shipped",
"Out for Delivery",
"Delivered"
];

/* Load Orders */

let orders = JSON.parse(localStorage.getItem("orders")) || [];

document.getElementById("orderTitle").innerHTML =
"📦 Orders ("+orders.length+")";

/* Show Orders */

function showOrders(){

let html="";

if(orders.length==0){

html="<p>No Orders Found</p>";

}else{

orders.forEach(function(o,i){

let status = o.status || 0;

html+=`

<div class="order">

<p><b>Order ID:</b> ${o.id}</p>

<p><b>Quantity:</b> ${o.quantity || 1}</p>

<p><b>Price:</b> ₹${o.price}</p>

<p><b>Date:</b> ${o.date || "N/A"}</p>

<p class="utr"><b>UTR:</b> ${o.utr || "Not Provided"}</p>

<p class="status"><b>Status:</b> ${steps[status]}</p>

<select id="status${i}">

<option value="0" ${status==0?"selected":""}>Order Placed</option>
<option value="1" ${status==1?"selected":""}>Packed</option>
<option value="2" ${status==2?"selected":""}>Shipped</option>
<option value="3" ${status==3?"selected":""}>Out for Delivery</option>
<option value="4" ${status==4?"selected":""}>Delivered</option>

</select>

<br>

<button class="updateBtn" onclick="updateStatus(${i})">
Update Status
</button>

<button class="approveBtn" onclick="approvePayment(${i})">
Approve Payment
</button>

<button onclick="deleteOrder(${i})">
Delete
</button>

</div>

`;

});

}

document.getElementById("orders").innerHTML=html;

}

showOrders();

/* Update Status */

function updateStatus(i){

let newStatus=document.getElementById("status"+i).value;

orders[i].status=parseInt(newStatus);

localStorage.setItem("orders",JSON.stringify(orders));

alert("✅ Status Updated");

showOrders();

}

/* Approve Payment */

function approvePayment(i){

orders[i].payment="Approved";

localStorage.setItem("orders",JSON.stringify(orders));

alert("💳 Payment Approved");

showOrders();

}

/* Delete Order */

function deleteOrder(i){

if(confirm("Delete this order?")){

orders.splice(i,1);

localStorage.setItem("orders",JSON.stringify(orders));

showOrders();

}

}

/* Clear Orders */

function clearOrders(){

if(confirm("Delete all orders?")){

localStorage.removeItem("orders");

orders=[];

showOrders();

}

}

/* Logout */

function logout(){

localStorage.removeItem("admin");

window.location="admin-login.html";

}

/* SHOW LAST ORDER */

let last = JSON.parse(localStorage.getItem("lastOrder"));

if(last){

document.getElementById("lastOrder").innerHTML=

"Order ID: "+last.id+"<br>"+
"Amount: ₹"+last.amount+"<br>"+
"Status: "+last.status;

}

</script>

</body>
</html>
