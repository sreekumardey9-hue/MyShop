<!DOCTYPE html>
<html>

<head>
<title>MyShop Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

/* Navbar */

.navbar{
background:#333;
color:white;
padding:15px;
}

/* Login Box */

.login-box{
background:white;
width:320px;
padding:25px;
margin:100px auto;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:green;
color:white;
padding:10px;
border:none;
cursor:pointer;
width:95%;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#0a7c0a;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#007bff;
}

.error{
color:red;
font-size:14px;
}

</style>

</head>

<body>

<div class="navbar">
<h2>MyShop 🛒</h2>
</div>

<div class="login-box">

<h2>Login</h2>

<input type="text" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter password">

<p class="error" id="error"></p>

<button onclick="login()">Login</button>

<button onclick="register()">Register</button>

<a href="index.html">Go to Shopping Website</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* Firebase Config */

const firebaseConfig = {

apiKey: "AIzaSyA9-3q-gVMQJqe_7BF8ojnu21CxNlatHnY",
  authDomain: "myshop-fc2bb.firebaseapp.com",
  projectId: "myshop-fc2bb",
  storageBucket: "myshop-fc2bb.firebasestorage.app",
  messagingSenderId: "469326585683",
  appId: "1:469326585683:web:412699ec702da4b9d98ba6"

};

/* Initialize Firebase */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* Register */

window.register = function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email=="" || password==""){
document.getElementById("error").innerText="Enter email and password";
return;
}

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Account Created Successfully");

})

.catch(e=>{

document.getElementById("error").innerText=e.message;

});

}

/* Login */

window.login = function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email=="" || password==""){
document.getElementById("error").innerText="Enter email and password";
return;
}

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

localStorage.setItem("login","true");

alert("Login Success");

window.location.href="index.html";

})

.catch(()=>{

document.getElementById("error").innerText="Wrong email or password";

});

}

/* Enter key login */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
