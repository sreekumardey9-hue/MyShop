<!DOCTYPE html>
<html>

<head>
<title>MyShop Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

/* Navbar */

.navbar{
background:#333;
color:white;
padding:15px;
}

/* Login Box */

.login-box{
background:white;
width:320px;
padding:25px;
margin:100px auto;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:green;
color:white;
padding:10px;
border:none;
cursor:pointer;
width:95%;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#0a7c0a;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#007bff;
}

.error{
color:red;
font-size:14px;
}

</style>

</head>

<body>

<div class="navbar">
<h2>MyShop 🛒</h2>
</div>

<div class="login-box">

<h2>Login</h2>

<input type="text" id="number" placeholder="Enter Mobile Number">

<input type="password" id="password" placeholder="Enter password">

<p class="error" id="error"></p>

<button onclick="login()">Login</button>

<a href="register.html">Don't have account? Register</a>

<a href="index.html">Go to Shopping Website</a>

</div>

<script>

function login(){

let number = document.getElementById("number").value;
let pass = document.getElementById("password").value;

let savedNumber = localStorage.getItem("mynumber");
let savedPass = localStorage.getItem("mypassword");

if(number=="" || pass==""){
document.getElementById("error").innerText="Please enter mobile number and password";
return;
}

if(number==savedNumber && pass==savedPass){

localStorage.setItem("login","true");

window.location.href="index.html";

}
else{

document.getElementById("error").innerText="Wrong number or password";

}

}

/* Enter key login */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
