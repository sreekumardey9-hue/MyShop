<!DOCTYPE html>
<html>
<head>
<title>MyShop OTP Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:350px;
margin:80px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#showOTP{
color:red;
font-size:20px;
}

</style>
</head>

<body>

<div class="box">

<h2>MyShop OTP Login</h2>

<input type="text" id="phone" placeholder="Enter phone number">

<br>

<button onclick="sendOTP()">Send OTP</button>

<p id="showOTP"></p>

<input type="text" id="otp" placeholder="Enter OTP">

<br>

<button onclick="verifyOTP()">Verify OTP</button>

</div>

<script>

let otp="";

function sendOTP(){

otp = Math.floor(100000 + Math.random()*900000);

document.getElementById("showOTP").innerHTML="Your OTP: "+otp;

}

function verifyOTP(){

let userOTP=document.getElementById("otp").value;

if(userOTP==otp){

localStorage.setItem("login","true");

window.location="login-success.html";

}else{

alert("Wrong OTP");

}

}

</script>

</body>
</html>
