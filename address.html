<!DOCTYPE html>
<html>

<head>

<title>Set Delivery Address</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

.box{
width:350px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input,textarea{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
}

button{
background:green;
color:white;
border:none;
padding:12px;
cursor:pointer;
width:95%;
border-radius:6px;
font-size:16px;
}

button:hover{
background:#0a8f0a;
}

</style>

</head>

<body>

<div class="box">

<h2>🏠 Delivery Address</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="tel" id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Full Address"></textarea>

<input type="text" id="city" placeholder="City">

<input type="number" id="pincode" placeholder="Pincode">

<br><br>

<button onclick="saveAddress()">Save Address</button>

</div>

<script>

/* Load saved address */

let saved = JSON.parse(localStorage.getItem("userAddress"));

if(saved){

document.getElementById("name").value = saved.name || "";
document.getElementById("phone").value = saved.phone || "";
document.getElementById("address").value = saved.address || "";
document.getElementById("city").value = saved.city || "";
document.getElementById("pincode").value = saved.pincode || "";

}

function saveAddress(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let address=document.getElementById("address").value.trim();
let city=document.getElementById("city").value.trim();
let pincode=document.getElementById("pincode").value.trim();

/* Validation */

if(name=="" || phone=="" || address=="" || city=="" || pincode==""){
alert("Please fill all fields");
return;
}

if(phone.length!=10){
alert("Enter valid 10 digit phone number");
return;
}

if(pincode.length!=6){
alert("Enter valid 6 digit pincode");
return;
}

/* Save */

let userAddress={
name:name,
phone:phone,
address:address,
city:city,
pincode:pincode
};

localStorage.setItem("userAddress",JSON.stringify(userAddress));

alert("✅ Address Saved Successfully!");

window.location.href="payment.html";

}

</script>

</body>

</html>
