<!DOCTYPE html>
<html>
<head>
<title>OTP Verify</title>
</head>

<body>

<h2>Enter OTP</h2>

<input type="text" id="otp" placeholder="Enter OTP">

<button onclick="verify()">Verify</button>

<script>

function verify(){

let otp=document.getElementById("otp").value;

if(otp=="1234"){

alert("OTP Verified");

window.location="setpassword.html";

}else{

alert("Wrong OTP");

}

}

</script>

</body>
</html>
