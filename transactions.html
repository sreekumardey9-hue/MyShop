<!DOCTYPE html>
<html>

<head>

<title>Transaction History</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

.box{
background:white;
width:420px;
margin:80px auto;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.transaction{
border-bottom:1px solid #ddd;
padding:12px;
text-align:left;
}

.transaction p{
margin:5px 0;
}

button{
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:darkred;
}

</style>

</head>

<body>

<div class="box">

<h2>💳 Transaction History</h2>

<div id="transactions"></div>

<button onclick="clearTransactions()">Clear Transactions</button>

</div>

<script>

/* Load Orders */

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let html = "";

/* Show Orders */

if(orders.length == 0){

html = "<p>No Transactions Yet</p>";

}else{

orders.forEach(function(o){

html += `
<div class="transaction">
<p><b>Transaction ID:</b> ${o.id}</p>
<p><b>Items:</b> ${o.items}</p>
<p><b>Total Paid:</b> ₹${o.price}</p>
<p><b>Status:</b> Payment Successful ✅</p>
</div>
`;

});

}

document.getElementById("transactions").innerHTML = html;


/* Clear Transactions */

function clearTransactions(){

if(confirm("Delete all transactions?")){

localStorage.removeItem("orders");

location.reload();

}

}

</script>

</body>

</html>
