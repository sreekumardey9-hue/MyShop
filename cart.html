<!DOCTYPE html>
<html>

<head>

<title>My Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

button:active{
transform:scale(0.97);
}

.header{
background:black;
color:white;
padding:15px;
font-size:22px;
text-align:center;
cursor:pointer;
}

#count{
background:red;
color:white;
padding:2px 6px;
border-radius:50%;
margin-left:6px;
font-size:14px;
}

.cart{
width:95%;
max-width:700px;
margin:20px auto;
}

.item{
background:white;
padding:15px;
margin-bottom:12px;
display:flex;
align-items:center;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.item img{
width:90px;
height:70px;
border-radius:6px;
margin-right:15px;
object-fit:cover;
}

.name{
flex:1;
font-size:16px;
}

.price{
color:green;
font-weight:bold;
}

.qty{
margin-top:5px;
}

.qty button{
padding:4px 10px;
margin:3px;
background:#eee;
border:none;
border-radius:4px;
cursor:pointer;
}

.remove{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.totalBox{
background:white;
padding:20px;
margin-top:15px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.checkout{
background:#ff9f00;
color:white;
border:none;
padding:12px;
width:100%;
font-size:18px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.clear{
background:red;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
font-size:16px;
}

.empty{
text-align:center;
padding:40px;
color:#666;
}

</style>

</head>

<body>

<div class="header" onclick="goHome()">🛒 My Cart <span id="count">0</span></div>

<div class="cart">

<div id="cartItems"></div>

<div class="totalBox">

<p><b>Total Items:</b> <span id="items">0</span></p>

<p><b>Total Price:</b> ₹<span id="price">0</span></p>

<button class="checkout" onclick="goAddress()">Place Order</button>

<button class="clear" onclick="clearCart()">Clear Cart</button>

<a href="index.html">⬅ Back to Shopping</a>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showCart(){

let totalItems=0;
let totalPrice=0;
let html="";

if(cart.length==0){

html=`<div class="empty">
<h3>Your Cart is Empty</h3>
<p>Add some products first</p>
</div>`;

}

cart.forEach(function(p,i){

totalItems += p.qty;
totalPrice += p.price * p.qty;

html += `
<div class="item">

<img src="${p.image}">

<div class="name">

${p.name}<br>

<span class="price">₹${p.price}</span>

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
${p.qty}
<button onclick="changeQty(${i},1)">+</button>
</div>

</div>

<button class="remove" onclick="removeItem(${i})">Remove</button>

</div>
`;

});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("items").innerText=totalItems;
document.getElementById("price").innerText=totalPrice;
document.getElementById("count").innerText=totalItems;

}

showCart();

function changeQty(i,val){

cart[i].qty += val;

if(cart[i].qty<=0){
cart.splice(i,1);
}

localStorage.setItem("cart",JSON.stringify(cart));

showCart();

}

function removeItem(i){

cart.splice(i,1);

localStorage.setItem("cart",JSON.stringify(cart));

showCart();

}

function clearCart(){

localStorage.removeItem("cart");

cart=[];

alert("Cart cleared");

showCart();

}

function goHome(){

window.location.href="index.html";

}

/* ADDRESS PAGE */

function goAddress(){

let cartData = JSON.parse(localStorage.getItem("cart")) || [];

if(cartData.length==0){
alert("Cart Empty");
return;
}

window.location.href="address.html";

}

</script>

</body>
</html>
