<!DOCTYPE html>
<html>

<head>

<title>My Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.cart-box{
width:420px;
max-width:95%;
margin:60px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

.item{
display:flex;
align-items:center;
border-bottom:1px solid #ddd;
padding:12px 0;
}

.item img{
width:70px;
height:70px;
border-radius:6px;
margin-right:10px;
}

.name{
flex:1;
}

.price{
color:green;
font-weight:bold;
}

.qty button{
padding:3px 8px;
margin:2px;
}

button{
background:green;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
margin:3px;
}

.remove{
background:red;
}

.clear{
background:red;
width:100%;
margin-top:10px;
}

.checkout{
width:100%;
margin-top:10px;
}

a{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
}

</style>

</head>

<body>

<div class="cart-box">

<h2>🛒 Your Cart</h2>

<div id="cartItems"></div>

<p><b>Total Items:</b> <span id="items">0</span></p>

<p><b>Total Price:</b> ₹<span id="price">0</span></p>

<button class="checkout" onclick="checkout()">Checkout</button>

<button class="clear" onclick="clearCart()">Clear Cart</button>

<a href="index.html">⬅ Back to Shopping</a>

</div>

<script>

/* Load cart */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showCart(){

let totalItems=0;
let totalPrice=0;
let html="";

cart.forEach(function(p,i){

totalItems += p.qty;
totalPrice += p.price * p.qty;

html += `
<div class="item">

<img src="${p.image}">

<div class="name">
${p.name}<br>
<span class="price">₹${p.price}</span>

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
${p.qty}
<button onclick="changeQty(${i},1)">+</button>
</div>

</div>

<button class="remove" onclick="removeItem(${i})">Remove</button>

</div>
`;

});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("items").innerText=totalItems;
document.getElementById("price").innerText=totalPrice;

}

showCart();

/* Quantity change */

function changeQty(i,val){

cart[i].qty += val;

if(cart[i].qty<=0){
cart.splice(i,1);
}

localStorage.setItem("cart",JSON.stringify(cart));

showCart();

}

/* Remove item */

function removeItem(i){

cart.splice(i,1);

localStorage.setItem("cart",JSON.stringify(cart));

showCart();

}

/* Checkout */

function checkout(){

if(cart.length==0){
alert("Cart is empty!");
}else{
window.location.href="payment.html";
}

}

/* Clear cart */

function clearCart(){

localStorage.removeItem("cart");

alert("Cart cleared");

cart=[];

showCart();

}

</script>

</body>

</html>
